<!DOCTYPE html>
<html>
<head>
  <title>Add Warehouse</title>
</head>
<body>
  <h2>Add Warehouse</h2>
  <form method="POST">
    <label>Warehouse Name:</label><br>
    <input name="name" required><br><br>

    <label>City:</label><br>
    <input name="city" required><br><br>

    <label>Latitude:</label><br>
    <input name="lat" step="any" required><br><br>

    <label>Longitude:</label><br>
    <input name="lon" step="any" required><br><br>

    <button type="submit">Add Warehouse</button>
  </form>
</body>
</html>
