<!DOCTYPE html>
<html>
<head>
  <title>Edit Item</title>
</head>
<body>
  <h2>Edit Item</h2>
  <a href="/warehouse/{{ wid }}">← Back to Items</a><br><br>

  <form method="POST">
    <label>Image URL (optional):</label><br>
<input name="image_url" type="url" value="{{ item.image }}"><br><br>

    <label>Item Name:</label><br>
    <input name="item" value="{{ item.name }}" required><br><br>

    <label>Quantity:</label><br>
    <input name="quantity" type="number" min="1" value="{{ item.quantity }}" required><br><br>

    <button type="submit">Update</button>
  </form>
</body>
</html>
